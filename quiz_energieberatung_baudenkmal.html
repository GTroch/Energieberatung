// ─── State ───
let current = 0;
let score = 0;
let answered = false;
let shuffled = [];

// Per-category tracking
const catStats = {};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initQuiz() {
  shuffled = shuffle(questions);
  current = 0;
  score = 0;
  answered = false;
  Object.keys(catStats).forEach(k => delete catStats[k]);
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = shuffled[current];

  document.getElementById('progress-bar').style.width = (current / shuffled.length * 100) + '%';
  document.getElementById('progress-text').textContent = `Frage ${current + 1} von ${shuffled.length}`;
  document.getElementById('score-badge').textContent = `✓ ${score}`;
  document.getElementById('category-tag').textContent = q.cat;
  document.getElementById('question-number').textContent = `Frage ${current + 1}`;
  document.getElementById('question-text').textContent = q.q;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    optDiv.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('next-btn').style.display = 'none';
}

function selectAnswer(chosen) {
  if (answered) return;
  answered = true;

  const q = shuffled[current];
  const buttons = document.querySelectorAll('.option-btn');
  const isCorrect = (chosen === q.a);

  // Update category stats
  if (!catStats[q.cat]) catStats[q.cat] = { total: 0, correct: 0 };
  catStats[q.cat].total++;
  if (isCorrect) {
    catStats[q.cat].correct++;
    score++;
  }

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.a) btn.classList.add(chosen === i ? 'correct' : 'reveal');
    else if (i === chosen && !isCorrect) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  fb.innerHTML = `<span class="feedback-icon">${isCorrect ? '✅' : '❌'}</span> ${isCorrect ? '<strong>Richtig!</strong> ' : '<strong>Leider falsch.</strong> '}${q.expl}`;
  fb.className = 'feedback ' + (isCorrect ? 'correct-fb' : 'wrong-fb');

  document.getElementById('score-badge').textContent = `✓ ${score}`;
  document.getElementById('next-btn').style.display = 'block';

  if (current === shuffled.length - 1) {
    document.getElementById('next-btn').textContent = 'Ergebnis anzeigen →';
  }
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-text').textContent = 'Abgeschlossen!';
  document.getElementById('score-badge').textContent = `✓ ${score}`;

  const pct = Math.round(score / shuffled.length * 100);
  document.getElementById('result-score').textContent = `${score} / ${shuffled.length}`;

  let icon, grade, text;
  if (pct >= 90) { icon = '🏆'; grade = 'Sehr gut'; text = 'Hervorragende Leistung! Sie beherrschen das Thema sehr sicher.'; }
  else if (pct >= 75) { icon = '🥇'; grade = 'Gut'; text = 'Sehr gutes Ergebnis! Nur noch wenige Details zu festigen.'; }
  else if (pct >= 60) { icon = '👍'; grade = 'Befriedigend'; text = 'Solides Ergebnis. Einige Bereiche sind noch zu vertiefen.'; }
  else if (pct >= 45) { icon = '📚'; grade = 'Ausreichend'; text = 'Grundlagenwissen vorhanden. Bitte die markierten Themen wiederholen.'; }
  else { icon = '📖'; grade = 'Nicht bestanden'; text = 'Bitte den Lernstoff erneut durcharbeiten und das Quiz wiederholen.'; }

  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-grade').textContent = `${pct}% – ${grade}`;
  document.getElementById('result-text').textContent = text;

  // Category breakdown
  const statsDiv = document.getElementById('category-stats');
  let html = '<h3>Ergebnis nach Themenbereich</h3>';
  Object.entries(catStats).forEach(([cat, s]) => {
    const p = Math.round(s.correct / s.total * 100);
    html += `
      <div class="cat-row">
        <span class="cat-name">${cat}</span>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${p}%"></div></div>
        <span class="cat-num">${s.correct}/${s.total}</span>
      </div>`;
  });
  statsDiv.innerHTML = html;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() {
  initQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Start
initQuiz();
</script>
